name: directory-listing
on: [push]

jobs:
  generate-index:
    runs-on: ubuntu-latest
    name: Generate Directory Listings
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4          # Optional: bump checkout too

      - name: Generate Directory Listings
        uses: jayanta525/github-pages-directory-listing@v3.0.0
        with:
          FOLDER: .   # or 'data' if you prefer

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3   # Updated from v1
        with:
          path: '.'

  deploy:
    needs: generate-index
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4             # Updated from v1